name: Publish to Maven Central

on:
  workflow_dispatch:

concurrency:
  group: "publish"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true

      # Do the compile and test separate from publishing,
      # else it could start publishing before all modules have been verified.
      # Also disable configuration cache as it won't be used or saved
      - name: Compile and test
        run: ./gradlew build --no-configuration-cache

      - name: Release
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          ORG_GRADLE_PROJECT_mavenGpgSecretKey: ${{ secrets.ORG_GRADLE_PROJECT_MAVENGPGSECRETKEY }}
          ORG_GRADLE_PROJECT_mavenGpgKeyId: ${{ secrets.ORG_GRADLE_PROJECT_MAVENGPGKEYID }}
